name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract current version
        id: version
        run: |
          if [ -f CHANGELOG.md ]; then
            CURRENT=$(grep -m1 '^## \[v' CHANGELOG.md | sed -n 's/^## \[v\([^]]*\)\].*/\1/p')
          fi
          if [ -z "$CURRENT" ]; then
            echo "first_release=true" >> $GITHUB_OUTPUT
            echo "current=0.0.0" >> $GITHUB_OUTPUT
          else
            echo "first_release=false" >> $GITHUB_OUTPUT
            echo "current=$CURRENT" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        id: new_version
        run: |
          if [ "${{ steps.version.outputs.first_release }}" = "true" ]; then
            NEW_VERSION="1.0.0"
          else
            CURRENT="${{ steps.version.outputs.current }}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            
            case "${{ github.event.inputs.bump_type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        run: |
          git fetch --unshallow --tags
          
          if [ "${{ steps.version.outputs.first_release }}" = "true" ]; then
            git log --pretty=format:"- %s (%h)" --reverse > /tmp/commits.txt 2>/dev/null || echo "-" > /tmp/commits.txt
          else
            PREV_TAG="v${{ steps.version.outputs.current }}"
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --reverse > /tmp/commits.txt 2>/dev/null || echo "-" > /tmp/commits.txt
          fi

      - name: Update CHANGELOG
        run: |
          NEW_VERSION="v${{ steps.new_version.outputs.new }}"
          DATE=$(date +%Y-%m-%d)
          
          cat > /tmp/changelog_entry.md << EOF
          ## [$NEW_VERSION] - $DATE

          ### Changes
          $(cat /tmp/commits.txt)

          EOF
          
          if [ -f CHANGELOG.md ]; then
            awk '/^# Changelog/{print; system("cat /tmp/changelog_entry.md"); next}1' CHANGELOG.md > /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/changelog_entry.md >> CHANGELOG.md
          fi
          
          sed -i "s/\$DATE/$DATE/" CHANGELOG.md

      - name: Commit and tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "Release v${{ steps.new_version.outputs.new }}"
          git tag "v${{ steps.new_version.outputs.new }}"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.new_version.outputs.new }}
          name: v${{ steps.new_version.outputs.new }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
